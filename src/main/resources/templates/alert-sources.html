<!DOCTYPE html>
<html>
<head><title>Mondash</title></head>
<style>
    table, th, td {
        border: 1px solid black;
    }
    table {
        border-collapse: collapse;
    }
</style>
<body>
    <table>
        <tr>
            <th>id</th>
            <th>name</th>
            <th>parameters</th>
        </tr>
        {{#alert-sources}}
        <tr>
            <td>{{id}}</td>
            <td>{{name}}</td>
            <td>
                <ul>
                    {{#parameters}}
                    <li><b>{{key}}</b>: {{value}}</li>
                    {{/parameters}}
                </ul>
            </td>
        </tr>
        {{/alert-sources}}
    </table>
</body>
</html>
